<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔒 WebAuthn Face ID 測試</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --primary: #007aff; --success: #34c759; --danger: #ff3b30; --bg: #f2f2f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; text-align: center; margin-bottom: 15px; }
        h1 { font-size: 22px; margin-bottom: 5px; color: #1c1c1e; }
        p { font-size: 14px; color: #8e8e93; margin-bottom: 20px; }
        .btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; }
        .btn:active { background: #0056b3; }
        .btn-secondary { background: #8e8e93; }
        .status-box { padding: 12px; border-radius: 10px; font-weight: bold; font-size: 14px; margin-bottom: 15px; display: none; }
        .status-success { display: block; background: #e8f5e9; color: var(--success); }
        .status-error { display: block; background: #ffebee; color: var(--danger); }
        .console-log { width: 100%; max-width: 400px; background: #1c1c1e; color: #34c759; font-family: monospace; font-size: 12px; padding: 15px; border-radius: 12px; box-sizing: border-box; text-align: left; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <h1>🛡️ Face ID 獨立測試</h1>
    <p>專門用來測試 iOS Safari / PWA 的 WebAuthn API</p>
    
    <div id="status-message" class="status-box"></div>

    <button class="btn" onclick="testRegisterFaceID()">步驟 1：首次綁定 Face ID</button>
    
    <button class="btn" style="background: var(--success);" onclick="testVerifyFaceID()">步驟 2：呼叫 Face ID 驗證</button>
    
    <hr style="border: 0; border-top: 1px solid #e5e5ea; margin: 20px 0;">
    
    <button class="btn btn-secondary" onclick="clearDebugLogs()">清除日誌</button>
</div>

<div class="console-log" id="debug-log">
    [System] 測試頁面已準備就緒。<br>
    [System] 檢查環境中...<br>
</div>

<script>
// 偵錯 Log 輸出器
function log(msg, isError = false) {
    const logBox = document.getElementById('debug-log');
    const color = isError ? '#ff3b30' : '#34c759';
    logBox.innerHTML += `<span style="color: ${color}">[${new Date().toLocaleTimeString()}] ${msg}</span><br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

// 顯示畫面狀態
function showStatus(text, isSuccess) {
    const box = document.getElementById('status-message');
    box.innerText = text;
    box.className = isSuccess ? "status-box status-success" : "status-box status-error";
}

// 環境自我檢查
if (!window.PublicKeyCredential) {
    log("❌ 錯誤：此瀏覽器完全不支援 WebAuthn API (Face ID)。", true);
} else {
    log("🍏 瀏覽器支援 WebAuthn。");
    PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(available => {
        if (available) log("👉 本機支援 Face ID / Touch ID 生物辨識。");
        else log("⚠️ 注意：本機目前未啟用或不支援生物辨識。", true);
    });
}
if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost') {
    log("❌ 警告：WebAuthn 必須在 HTTPS 安全連線下運作！目前不是 HTTPS。", true);
}

// ==========================================
// 💡 步驟 1: 首次綁定 Face ID (建立憑證)
// ==========================================
async function testRegisterFaceID() {
    log("開始執行 [步驟 1：綁定 Face ID]...");
    try {
        // 1. 生成安全隨機 32 位元組的 challenge
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        // 2. 生成符合 MDN 與 iOS 嚴格規範的唯一 User ID (必須是符合標準的 ArrayBuffer)
        // 使用隨機數生成固定的 16 位元組用戶 ID，防止因簡單字串導致 iOS 拒絕
        const userId = new Uint8Array(16);
        window.crypto.getRandomValues(userId);

        const publicKeyCredentialCreationOptions = {
            challenge: challenge,
            rp: {
                name: "FaceID Test App",
                id: window.location.hostname // 必須是當前 HTTPS 域名，不能是純 IP
            },
            user: {
                id: userId,
                name: "test-user-01@test.com",
                displayName: "Tester"
            },
            pubKeyCredParams: [
                { typeof: "public-key", alg: -7 },   // ES256 (iOS / Apple 最常使用)
                { typeof: "public-key", alg: -257 }  // RS256 (備用相容)
            ],
            authenticatorSelection: {
                authenticatorAttachment: "platform", // 鎖定本機裝置 (Face ID / Touch ID)
                userVerification: "required",        // 強制要求驗證
                residentKey: "required"              // 銀行級 Passkey 必備，確保本機留底
            },
            timeout: 60000
        };

        log("正在喚起 iOS Face ID 授權視窗...");
        const credential = await navigator.credentials.create({
            publicKey: publicKeyCredentialCreationOptions
        });

        log("🎉 成功！Face ID 綁定授權通過！");
        log(`憑證 ID: ${credential.id.substring(0, 15)}...`);
        showStatus("🎉 Face ID 綁定成功！", true);

    } catch (err) {
        showStatus("❌ 綁定失敗", false);
        log(`❌ 失敗原因 (${err.name}): ${err.message}`, true);
        
        // 常見錯誤詳細剖析
        if (err.name === 'NotAllowedError') {
            log("💡 提示 (NotAllowedError): 使用者取消了 Face ID，或者此網域未獲取 Face ID 權限。如果你是用國外伺服器 IP 且沒有配域名，iOS 會直接秒彈此錯誤！", true);
        } else if (err.name === 'SecurityError') {
            log("💡 提示 (SecurityError): 網域安全檢查未通過。請確認 Nginx 是否開啟了完整的 HTTPS，且你不是用純 IP 網址訪問。", true);
        }
    }
}

// ==========================================
// 💡 步驟 2: 呼叫 Face ID 驗證 (獲取憑證)
// ==========================================
async function testVerifyFaceID() {
    log("開始執行 [步驟 2：Face ID 驗證]...");
    try {
        const challenge = new Uint8Array(32);
        window.crypto.getRandomValues(challenge);

        const publicKeyCredentialRequestOptions = {
            challenge: challenge,
            rpId: window.location.hostname,
            userVerification: "required",
            timeout: 60000
        };

        log("正在喚起 Face ID 掃描...");
        const assertion = await navigator.credentials.get({
            publicKey: publicKeyCredentialRequestOptions
        });

        log("🟢 成功！Face ID 驗證比對成功！");
        showStatus("🟢 Face ID 驗證成功！", true);

    } catch (err) {
        showStatus("❌ 驗證失敗", false);
        log(`❌ 失敗原因 (${err.name}): ${err.message}`, true);
    }
}

function clearDebugLogs() {
    document.getElementById('debug-log').innerHTML = "[System] 日誌已清空。<br>";
    document.getElementById('status-message').style.display = 'none';
}
</script>

</body>
</html>
